<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DC Hotshots Vereinsbar</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --accent: #e94560;
      --accent2: #f5a623;
      --green: #2ecc71;
      --blue: #74b9ff;
      --text: #eaeaea;
      --text2: #a0a8b8;
      --border: #2a3a5c;
      --radius: 12px;
      --nav-h: 60px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: .5px; }
    header h1 span { color: var(--accent); }

    #app {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      padding-bottom: calc(var(--nav-h) + 14px);
    }

    nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    nav button {
      flex: 1;
      background: none;
      border: none;
      color: var(--text2);
      font-size: .58rem;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      padding: 0;
    }
    nav button .icon { font-size: 1.25rem; }
    nav button.active { color: var(--accent); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-header h2 { font-size: .92rem; font-weight: 700; }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.96); opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-blue { background: #1a6fa8; color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: .73rem; }
    .btn-icon { background: none; border: none; font-size: 1rem; cursor: pointer; padding: 4px; line-height: 1; }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 12px;
      font-size: .88rem;
      width: 100%;
    }
    input:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
    label { font-size: .78rem; color: var(--text2); display: block; margin-bottom: 4px; }
    .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .form-row .field { flex: 1; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .list-item:last-child { border-bottom: none; }
    .list-item .name { flex: 1; font-weight: 600; font-size: .88rem; }
    .list-item .sub { font-size: .72rem; color: var(--text2); }
    .sort-btns { display: flex; flex-direction: column; gap: 0; }
    .sort-btns .btn-icon { font-size: .7rem; padding: 1px 4px; color: var(--text2); }

    .qty-badge {
      background: var(--surface2);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: .78rem;
      font-weight: 700;
      min-width: 34px;
      text-align: center;
    }
    .qty-badge.low { background: #7a1a1a; color: #ff6b6b; }

    .guest-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
    }
    .guest-card {
      background: var(--surface2);
      border: 2px solid transparent;
      border-radius: var(--radius);
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
    }
    .guest-card:active { transform: scale(.96); }
    .guest-card.selected { border-color: var(--accent); }
    .guest-card .gname { font-size: .82rem; font-weight: 700; }
    .guest-card .gtab { font-size: .72rem; color: var(--accent2); font-weight: 600; margin-top: 2px; }

    .article-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 7px;
      margin-top: 8px;
    }
    .article-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 9px 5px;
      text-align: center;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .article-btn:active { transform: scale(.94); background: var(--surface); }
    .article-btn.out { opacity: .35; pointer-events: none; }
    .article-btn .aname { font-size: .75rem; font-weight: 700; line-height: 1.2; }
    .article-btn .aprice { font-size: .72rem; color: var(--accent2); margin-top: 3px; }
    .article-btn .astock { font-size: .62rem; color: var(--text2); }

    .order-line {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .order-line:last-child { border-bottom: none; }
    .order-line .oname { flex: 1; font-size: .83rem; }
    .order-line .odate { font-size: .68rem; color: var(--text2); }
    .qty-ctrl { display: flex; align-items: center; gap: 5px; }
    .qty-ctrl button {
      background: var(--surface2);
      border: none;
      border-radius: 6px;
      color: var(--text);
      width: 26px; height: 26px;
      font-size: .95rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-ctrl .qty-num { min-width: 18px; text-align: center; font-weight: 700; font-size: .88rem; }
    .order-line .osum { color: var(--accent2); font-weight: 700; font-size: .83rem; min-width: 46px; text-align: right; }

    .total-bar {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .total-bar .label { font-size: .82rem; color: var(--text2); }
    .total-bar .amount { font-size: 1.25rem; font-weight: 800; color: var(--accent2); }

    .pill-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .pill {
      background: var(--surface2);
      border: none;
      border-radius: 20px;
      color: var(--text2);
      font-size: .75rem;
      font-weight: 600;
      padding: 5px 12px;
      cursor: pointer;
    }
    .pill.active { background: var(--accent); color: #fff; }

    .bill-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .bill-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      cursor: pointer;
      user-select: none;
    }
    .bill-header .bname { flex: 1; font-weight: 700; font-size: .88rem; }
    .bill-header .btotal { color: var(--accent2); font-weight: 800; font-size: .88rem; }
    .bill-header .chevron { font-size: .75rem; color: var(--text2); transition: transform .2s; }
    .bill-header.open .chevron { transform: rotate(180deg); }
    .bill-details { padding: 0 14px 12px; display: none; }
    .bill-details.open { display: block; }
    .bill-detail-line {
      display: flex;
      justify-content: space-between;
      font-size: .78rem;
      padding: 3px 0;
      color: var(--text2);
    }
    .bill-detail-line .bdate { font-size: .68rem; color: var(--text2); margin-left: 6px; }
    .bill-detail-line span:last-child { color: var(--text); font-weight: 600; }
    .bill-actions { display: flex; gap: 8px; margin-top: 10px; }

    .empty { text-align: center; padding: 36px 20px; color: var(--text2); }
    .empty .eicon { font-size: 2.2rem; margin-bottom: 10px; }

    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: .8rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 200;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 300;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 32px;
      width: 100%;
      max-width: 480px;
      transform: translateY(40px);
      transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h3 { font-size: .98rem; margin-bottom: 14px; font-weight: 700; }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
    .modal-actions .btn { flex: 1; padding: 11px; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* Bericht */
    .month-select { margin-bottom: 14px; }
    .report-section { margin-bottom: 16px; }
    .report-section h3 { font-size: .85rem; font-weight: 700; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .6px; }
    .report-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: .82rem;
    }
    .report-row:last-child { border-bottom: none; }
    .report-row .rname { flex: 1; }
    .report-row .rqty { color: var(--text2); font-size: .75rem; margin-right: 12px; }
    .report-row .ramount { font-weight: 700; }
    .report-row .ramount.income { color: var(--green); }
    .report-row .ramount.expense { color: var(--accent); }
    .summary-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .summary-chip {
      flex: 1;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 10px 12px;
      text-align: center;
    }
    .summary-chip .sc-label { font-size: .68rem; color: var(--text2); font-weight: 600; text-transform: uppercase; }
    .summary-chip .sc-val { font-size: 1.1rem; font-weight: 800; margin-top: 2px; }
    .summary-chip .sc-val.income { color: var(--green); }
    .summary-chip .sc-val.expense { color: var(--accent); }
    .summary-chip .sc-val.profit { color: var(--accent2); }

    /* ── PDF / Print ── */
    .pdf-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 10px; margin-bottom: 14px;
      background: var(--card); border: 1.5px dashed var(--border);
      color: var(--text2); border-radius: 10px; font-size: .85rem;
      cursor: pointer; font-weight: 600;
    }
    .pdf-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    @media print {
      /* WICHTIG: Bildschirm-Beschränkungen aufheben, damit der GESAMTE Inhalt
         über mehrere Seiten gedruckt wird (statt nur des sichtbaren Ausschnitts) */
      html, body { height: auto !important; overflow: visible !important; }
      body { display: block !important; background: #fff !important; color: #000 !important; }
      nav, .pdf-btn, .btn, .btn-icon, .sort-btns,
      #login-overlay, #login-screen, .toast { display: none !important; }
      #app { position: static !important; flex: none !important;
             height: auto !important; overflow: visible !important; padding: 0 !important; }
      .month-select select { display: none !important; }
      .card { background: #fff !important; border: 1px solid #ccc !important;
               box-shadow: none !important; break-inside: avoid; }
      .card-header h2, h2, h3 { color: #000 !important; }
      .name, .rname { color: #000 !important; }
      .sub, .report-row > div > div:last-child { color: #555 !important; }
      .qty-badge { background: #eee !important; color: #000 !important; border: 1px solid #ccc; }
      .qty-badge.low { background: #fdd !important; color: #900 !important; }
      .ramount.income { color: #1a7a3c !important; }
      .ramount.expense { color: #c0392b !important; }
      .sc-val.income { color: #1a7a3c !important; }
      .sc-val.expense { color: #c0392b !important; }
      .sc-val.profit { color: #1a5fa8 !important; }
      .summary-bar { background: #f5f5f5 !important; border: 1px solid #ccc !important; }
      .print-title { display: block !important; font-size: 1.1rem; font-weight: 800;
                     margin-bottom: 12px; color: #000; }
      header { display: none !important; }
    }
    .print-title { display: none; }
  </style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen" style="
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;padding:32px;
">
  <div style="font-size:2.5rem;margin-bottom:12px">🎯</div>
  <div style="font-size:1.2rem;font-weight:800;margin-bottom:4px">DC Hotshots</div>
  <div style="font-size:.85rem;color:var(--text2);margin-bottom:32px">Vereinsbar</div>
  <input id="login-pw" type="password" placeholder="Passwort" autofocus
    style="max-width:240px;text-align:center;font-size:1.1rem;letter-spacing:.2em;margin-bottom:14px"
    onkeydown="if(event.key==='Enter') checkLogin()">
  <button class="btn btn-primary" style="width:240px;padding:12px;font-size:.95rem" onclick="checkLogin()">Einloggen</button>
  <div id="login-err" style="color:var(--accent);font-size:.8rem;margin-top:10px;min-height:1.2em"></div>
</div>

<header>
  <h1>🎯 DC Hotshots <span>Vereinsbar</span></h1>
  <div style="font-size:.6rem;color:var(--text2);margin-top:2px">v2026-07-02 (print)</div>
</header>

<main id="app"></main>

<nav>
  <button onclick="showPage('gaeste')" id="nav-gaeste">
    <span class="icon">👥</span>Gäste
  </button>
  <button onclick="showPage('bestellung')" id="nav-bestellung">
    <span class="icon">🛒</span>Bestell.
  </button>
  <button onclick="showPage('abrechnung')" id="nav-abrechnung">
    <span class="icon">💶</span>Abrech.
  </button>
  <button onclick="showPage('inventur')" id="nav-inventur">
    <span class="icon">📦</span>Inventur
  </button>
  <button onclick="showPage('bericht')" id="nav-bericht">
    <span class="icon">📊</span>Bericht
  </button>
</nav>

<div id="toast"></div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
//  FIREBASE
// ══════════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyAqnfBs-ShWpKk6vmWc9t9eQRV1-RruSeg",
  authDomain: "dc-hotshots-bar.firebaseapp.com",
  databaseURL: "https://dc-hotshots-bar-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dc-hotshots-bar",
  storageBucket: "dc-hotshots-bar.firebasestorage.app",
  messagingSenderId: "533694552241",
  appId: "1:533694552241:web:901786f2cf26cdf28eea90"
});
const db = firebase.database();
const auth = firebase.auth();
const dbRef = db.ref('state');
let remoteUpdate = false; // verhindert Endlosschleife
let firebaseLoaded = false; // erst nach erstem Firebase-Read darf geschrieben werden
let membersLoaded = false;  // erst nach erstem Members-Read darf geschrieben werden
let migrated = false;       // einmalige Migration altes -> neues Firebase-Layout

// ══════════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════════
function checkLogin() {
  const pw = document.getElementById('login-pw').value;
  if (pw === '1957') {
    sessionStorage.setItem('darts-auth', '1');
    document.getElementById('login-screen').style.display = 'none';
  } else {
    document.getElementById('login-err').textContent = 'Falsches Passwort';
    document.getElementById('login-pw').value = '';
    document.getElementById('login-pw').focus();
  }
}

// ══════════════════════════════════════════
let state = {
  articles:     [],  // { id, name, category, price, stock, lowStockThreshold }
  members:      [],  // { id, name } — permanent
  guests:       [],  // { id, name } — pro Abend
  orders:       [],  // { id, guestId, articleId, qty, ts, paid, payMode }
  purchases:    [],  // { id, articleId, qty, costPerUnit, ts }
  einladungen:  [],  // { id, ts, amount } — eingeladene offene Beträge
};

function toArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  return Object.values(val);
}

// Fehlende guestName-Felder aus noch existierenden Personen nachtragen
function backfillGuestNames() {
  let changed = false;
  state.orders.forEach(o => {
    if (!o.guestName) {
      const p = findPerson(o.guestId);
      if (p) { o.guestName = p.name; changed = true; }
    }
  });
  return changed;
}

function loadState() {
  // Members zuerst aus localStorage (nur zur sofortigen Anzeige, NICHT nach Firebase schreiben)
  const savedMembers = localStorage.getItem('darts-members');
  if (savedMembers) {
    try { state.members = JSON.parse(savedMembers); } catch(e) {}
  }
  // WICHTIG: hier KEIN initMembers() — das würde Default-Mitglieder nach Firebase
  // schreiben, bevor wir die echten gelesen haben. Defaults nur seeden wenn Firebase leer ist.

  // Members Firebase-Listener: synct zwischen Geräten, überschreibt aber nie mit leer
  db.ref('members').on('value', snapshot => {
    const remoteMembers = toArray(snapshot.val());
    if (remoteMembers.length) {
      // Firebase hat Mitglieder -> als Quelle der Wahrheit übernehmen
      remoteUpdate = true;
      state.members = remoteMembers;
      localStorage.setItem('darts-members', JSON.stringify(state.members));
      membersLoaded = true;
      render();
      remoteUpdate = false;
    } else {
      // Firebase wirklich leer -> jetzt (und nur jetzt) seeden
      if (!state.members.length) fillDefaultMembers();
      membersLoaded = true;
      db.ref('members').set(state.members).catch(() => {});
      render();
    }
  });

  // Restliche Daten aus localStorage laden
  const saved = localStorage.getItem('darts-bar-state');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      state.articles  = parsed.articles  || [];
      state.guests    = parsed.guests    || [];
      state.orders    = parsed.orders    || [];
      state.purchases = parsed.purchases || [];
    } catch(e) {}
  }
  state.articles.forEach(a => { if (a.lowStockThreshold === undefined) a.lowStockThreshold = 3; });
  if (!state.articles.length) initDemo();

  // Firebase Listener: Artikel/Gäste/Bestellungen/Einkäufe/Einladungen — KEINE Members
  // Neues Layout:  data/meta = {articles, einladungen},  data/orders/<id>,
  //                data/purchases/<id>, data/guests/<id>  (jeweils einzeln gespeichert)
  // Altes Layout:  data.articles / data.orders ... als Arrays direkt unter data
  db.ref('data').on('value', snapshot => {
    const data = snapshot.val();
    const meta = data && data.meta ? data.meta : data; // Fallback altes Layout
    const articles    = toArray(meta && meta.articles);
    const einladungen = toArray(meta && meta.einladungen);
    const orders      = toArray(data && data.orders);
    const purchases   = toArray(data && data.purchases);
    const guests      = toArray(data && data.guests);

    const hasReal = articles.length || orders.length || purchases.length || guests.length;
    if (data && hasReal) {
      remoteUpdate = true;
      state.articles     = articles;
      state.guests       = guests;
      state.orders       = orders;
      state.purchases    = purchases;
      state.einladungen  = einladungen;
      state.articles.forEach(a => { if (a.lowStockThreshold === undefined) a.lowStockThreshold = 3; });
      const nameChanged = backfillGuestNames();
      localStorage.setItem('darts-bar-state', JSON.stringify(state));
      firebaseLoaded = true;
      render();
      remoteUpdate = false;

      // Einmalige Migration vom alten Layout (Arrays unter data) ins neue (data/meta + Einzel-Keys)
      if (!migrated && data && !data.meta) {
        migrated = true;
        db.ref('data').set({
          meta:      { articles: state.articles, einladungen: state.einladungen },
          orders:    arrToMap(state.orders),
          purchases: arrToMap(state.purchases),
          guests:    arrToMap(state.guests),
        }).catch(() => {});
      } else if (nameChanged) {
        // nachgetragene Namen einzeln zurückschreiben
        state.orders.forEach(o => putOrder(o));
      }
    } else {
      // Firebase leer: erst freigeben zum Schreiben, sobald lokale Daten existieren
      firebaseLoaded = true;
    }
  });
}

// Wandelt ein Array (mit .id) in eine nach id verschlüsselte Map für Firebase
function arrToMap(arr) {
  const m = {};
  (arr || []).forEach(x => { if (x && x.id) m[x.id] = x; });
  return m;
}

// Schreib-Helfer: nur erlaubt nach erfolgreichem Firebase-Read und nicht während Remote-Update
function fbReady() { return firebaseLoaded && !remoteUpdate; }
function saveLocal() {
  localStorage.setItem('darts-bar-state', JSON.stringify(state));
  if (state.members.length) localStorage.setItem('darts-members', JSON.stringify(state.members));
}
function saveMeta()      { if (fbReady()) db.ref('data/meta').set({ articles: state.articles, einladungen: state.einladungen }).catch(() => {}); }
function putOrder(o)     { if (fbReady() && o && o.id) db.ref('data/orders/' + o.id).set(o).catch(() => {}); }
function delOrder(id)    { if (fbReady()) db.ref('data/orders/' + id).remove().catch(() => {}); }
function putPurchase(p)  { if (fbReady() && p && p.id) db.ref('data/purchases/' + p.id).set(p).catch(() => {}); }
function delPurchase(id) { if (fbReady()) db.ref('data/purchases/' + id).remove().catch(() => {}); }
function putGuest(g)     { if (fbReady() && g && g.id) db.ref('data/guests/' + g.id).set(g).catch(() => {}); }
function delGuest(id)    { if (fbReady()) db.ref('data/guests/' + id).remove().catch(() => {}); }

// Füllt nur das Array mit Default-Mitgliedern — schreibt NICHT nach Firebase
function fillDefaultMembers() {
  state.members = ['Christian', 'Hans', 'Guido', 'Sabine', 'Ursi'].map(name => ({ id: uid(), name }));
}

function saveMembers() {
  localStorage.setItem('darts-members', JSON.stringify(state.members));
  // Members nur nach Firebase schreiben, wenn wir vorher gelesen haben
  // (verhindert, dass ein frisches Gerät die echte Liste mit Defaults überschreibt)
  if (!remoteUpdate && membersLoaded) {
    db.ref('members').set(state.members).catch(() => {});
  }
}

// saveState() persistiert Artikel + Einladungen (Meta) und den lokalen Speicher.
// Bestellungen/Einkäufe/Gäste werden EINZELN über put*/del* gespeichert.
function saveState() {

  saveMeta();
}

function exportBackup() {
  const backup = {
    version: 1,
    exportDate: new Date().toISOString(),
    articles:    state.articles,
    members:     state.members,
    guests:      state.guests,
    orders:      state.orders,
    purchases:   state.purchases,
    einladungen: state.einladungen,
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const stamp = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
  a.href = url;
  a.download = `dc-hotshots-backup_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('💾 Backup gespeichert');
}

  openModal(`
    <h3>🔒 Backup laden</h3>
    <p style="color:var(--text2);font-size:.85rem">Passwort erforderlich um ein Backup zu laden.</p>

      <label>Passwort</label>

    </div></div>

  const pw = document.getElementById('m-pw').value;
  if (pw !== '0719') { showToast('Falsches Passwort'); return; }
  closeModal();

}

function importBackup(input) {
  const file = input.files && input.files[0];
  input.value = ''; // erlaubt erneutes Laden derselben Datei
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let data;
    try { data = JSON.parse(e.target.result); }
    catch(err) { showToast('Ungültige Datei'); return; }
    if (!data || (!data.articles && !data.orders)) { showToast('Keine gültigen Daten'); return; }
    const cnt = (toArray(data.orders).length) + (toArray(data.purchases).length);
    if (!confirm(`Backup vom ${data.exportDate ? new Date(data.exportDate).toLocaleString('de-DE') : '?'} laden?\n\nAlle aktuellen Daten werden ersetzt.`)) return;
    state.articles    = toArray(data.articles);
    state.guests      = toArray(data.guests);
    state.orders      = toArray(data.orders);
    state.purchases   = toArray(data.purchases);
    state.einladungen = toArray(data.einladungen);
    if (toArray(data.members).length) {
      state.members = toArray(data.members);
      saveMembers();
    }
    saveLocal();
    // Komplettes neues Layout nach Firebase schreiben
    if (fbReady()) {
      db.ref('data').set({
        meta:      { articles: state.articles, einladungen: state.einladungen },
        orders:    arrToMap(state.orders),
        purchases: arrToMap(state.purchases),
        guests:    arrToMap(state.guests),
      }).catch(() => {});
    }
    showToast('✅ Backup geladen');
    render();
  };
  reader.readAsText(file);
}

function saveArticle() {
  const name = document.getElementById('m-name').value.trim();
  const price = parseFloat(document.getElementById('m-price').value) || 0;
  const stock = parseInt(document.getElementById('m-stock').value) || 0;
  const threshold = parseInt(document.getElementById('m-threshold').value) || 0;
  const category = document.getElementById('m-cat').value;
  const editId = document.getElementById('m-edit-id')?.value;
  if (!name) { showToast('Bitte Namen eingeben'); return; }
  if (editId) {
    const a = state.articles.find(x => x.id === editId);
    if (a) { a.name = name; a.price = price; a.stock = stock; a.category = category; a.lowStockThreshold = threshold; }
  } else {
    state.articles.push({ id: uid(), name, category, price, stock, lowStockThreshold: threshold });
  }
  saveState(); closeModal(); render();
}

function moveArticle(id, dir) {
  const idx = state.articles.findIndex(a => a.id === id);
  const cat = state.articles[idx].category;
  const catItems = state.articles.filter(a => a.category === cat);
  const catIdx = catItems.findIndex(a => a.id === id);
  const swapItem = catItems[catIdx + dir];
  if (!swapItem) return;
  const swapIdx = state.articles.findIndex(a => a.id === swapItem.id);
  [state.articles[idx], state.articles[swapIdx]] = [state.articles[swapIdx], state.articles[idx]];
  saveState(); render();
}

function deleteArticle(id) {
  if (!confirm('Artikel wirklich löschen?')) return;
  state.articles = state.articles.filter(a => a.id !== id);
  saveState(); closeModal(); render();
}

function saveRefill(articleId) {
  const qty = parseInt(document.getElementById('m-refill-qty').value) || 0;
  const cost = parseFloat(document.getElementById('m-refill-cost').value) || 0;
  if (qty <= 0) { showToast('Menge muss > 0 sein'); return; }
  const a = state.articles.find(x => x.id === articleId);
  if (!a) return;
  a.stock += qty;
  const p = { id: uid(), articleId, qty, costPerUnit: cost, ts: Date.now() };
  state.purchases.push(p);
  saveLocal();
  saveMeta();          // Lagerbestand (Artikel)
  putPurchase(p);      // Einkauf einzeln speichern
  closeModal();
  showToast(`✅ +${qty}x ${a.name} eingebucht`);
  render();
}

function renderPersonDetail() {
  const g = findPerson(selectedGuestId);
  if (!g) return '';
  const isMember = state.members.some(x => x.id === g.id);
  const orders = state.orders.filter(o => o.guestId === g.id && !o.paid);
  const total = orders.reduce((s, o) => {
    const a = state.articles.find(x => x.id === o.articleId);
    return s + (a ? a.price * o.qty : 0);
  }, 0);

  const lines = orders.map(o => {
    const a = state.articles.find(x => x.id === o.articleId);
    if (!a) return '';
    return `
      <div class="order-line">
        <div style="flex:1">
          <div class="oname">${esc(a.name)}</div>
          <div class="odate">${fmtDate(o.ts)}</div>
        </div>
        <span style="color:var(--text2);font-size:.78rem">${o.qty}×</span>
        <span class="osum">${fmt(a.price * o.qty)}</span>
      </div>
    `;
  }).join('');

  const removeBtn = isMember
    ? `<button class="btn-icon" onclick="removeMemberAuth('${g.id}')" title="Mitglied entfernen">❌</button>`
    : `<button class="btn-icon" onclick="removeGuest('${g.id}')" title="Gast entfernen">❌</button>`;

  return `
    <div class="card">
      <div class="card-header">
        <h2>${isMember ? '🏆' : '👤'} ${esc(g.name)}</h2>
        ${removeBtn}
      </div>
      ${orders.length ? lines : '<div style="color:var(--text2);font-size:.8rem">Kein offener Konsum</div>'}
      ${total > 0 ? `
        <hr class="divider">
        <div class="total-bar">
          <span class="label">Offener Tab</span>
          <span class="amount">${fmt(total)}</span>
        </div>
        <div style="margin-top:10px">
          <button class="btn btn-green" style="width:100%" onclick="payGuest('${g.id}','cash')">💵 Bar bezahlen</button>
        </div>
      ` : ''}
    </div>
  `;
}

function saveGuest() {
  const name = document.getElementById('m-gname').value.trim();
  if (!name) { showToast('Bitte Namen eingeben'); return; }
  const g = { id: uid(), name };
  state.guests.push(g);
  saveLocal(); putGuest(g); closeModal(); render();
}

function selectGuest(id) {
  selectedGuestId = selectedGuestId === id ? null : id;
  render();
}

function removeGuest(id) {
  // Vereinsmitglieder dürfen niemals über removeGuest gelöscht werden
  if (state.members.some(m => m.id === id)) {
    showToast('Vereinsmitglieder können nicht gelöscht werden');
    return;
  }
  if (!confirm('Gast entfernen?')) return;
  state.guests = state.guests.filter(g => g.id !== id);
  // Bezahlte Bestellungen bleiben für den Bericht erhalten, nur offene löschen
  const toDelete = state.orders.filter(o => o.guestId === id && !o.paid);
  state.orders = state.orders.filter(o => o.guestId !== id || o.paid);
  selectedGuestId = null;
  saveLocal();
  delGuest(id);
  toDelete.forEach(o => delOrder(o.id));
  render();
}

function payGuest(guestId, mode) {
  const changed = [];
  state.orders.forEach(o => {
    if (o.guestId === guestId && !o.paid) { o.paid = true; o.payMode = mode; changed.push(o); }
  });
  saveLocal();
  changed.forEach(o => putOrder(o));
  showToast('Bezahlt! 🎉');
  render();
}

// ══════════════════════════════════════════
//  BESTELLUNG
// ══════════════════════════════════════════
let orderGuestId = null;
let orderMode = 'tab';
let orderCart = {};

function renderBestellung() {
  const memberOptions = state.members.map(g =>
    `<option value="${g.id}" ${orderGuestId === g.id ? 'selected' : ''}>🏆 ${esc(g.name)}</option>`
  ).join('');
  const guestOptions = state.guests.map(g =>
    `<option value="${g.id}" ${orderGuestId === g.id ? 'selected' : ''}>👤 ${esc(g.name)}</option>`
  ).join('');
  const allOptions = (state.members.length ? `<optgroup label="Vereinsmitglieder">${memberOptions}</optgroup>` : '')
    + (state.guests.length ? `<optgroup label="Gäste heute">${guestOptions}</optgroup>` : '');

  const getraenke = state.articles.filter(a => a.category === 'getraenk');
  const suessigkeiten = state.articles.filter(a => a.category === 'suessigkeit');

  const renderArtBtns = (items) => items.map(a => `
    <div class="article-btn ${a.stock <= 0 ? 'out' : ''}" onclick="addToCart('${a.id}')">
      <div class="aname">${esc(a.name)}</div>
      <div class="aprice">${fmt(a.price)}</div>
      <div class="astock">${a.stock > 0 ? a.stock + ' verf.' : 'Vergriffen'}</div>
    </div>
  `).join('');

  const cartEntries = Object.entries(orderCart).filter(([,q]) => q > 0);
  const cartTotal = cartEntries.reduce((s, [id, q]) => {
    const a = state.articles.find(x => x.id === id);
    return s + (a ? a.price * q : 0);
  }, 0);

  const cartLines = cartEntries.map(([id, q]) => {
    const a = state.articles.find(x => x.id === id);
    if (!a) return '';
    return `
      <div class="order-line">
        <span class="oname">${esc(a.name)}</span>
        <div class="qty-ctrl">
          <button onclick="changeCart('${id}',-1)">−</button>
          <span class="qty-num">${q}</span>
          <button onclick="changeCart('${id}',1)">+</button>
        </div>
        <span class="osum">${fmt(a.price * q)}</span>
      </div>
    `;
  }).join('');

  return `
    <div class="card">
      <div class="card-header"><h2>Für wen?</h2></div>
      ${(state.members.length || state.guests.length)
        ? `<select onchange="setOrderGuest(this.value)">
            <option value="">— Person wählen —</option>
            ${allOptions}
           </select>`
        : `<div style="color:var(--text2);font-size:.8rem">Zuerst Gäste anlegen 👥</div>`}
      ${orderGuestId ? `
        <div style="display:flex;gap:6px;margin-top:10px">
          <button class="pill ${orderMode==='tab'?'active':''}" onclick="setOrderMode('tab')">📋 Tab</button>
          <button class="pill ${orderMode==='sofort'?'active':''}" onclick="setOrderMode('sofort')">💵 Sofort</button>
        </div>
      ` : ''}
    </div>
    ${orderGuestId ? `
    <div class="card">
      <h2 style="margin-bottom:8px">🍺 Getränke</h2>
      <div class="article-grid">${renderArtBtns(getraenke)}</div>
    </div>
    <div class="card">
      <h2 style="margin-bottom:8px">🍬 Süßigkeiten</h2>
      <div class="article-grid">${renderArtBtns(suessigkeiten)}</div>
    </div>
    ${cartEntries.length ? `
    <div class="card">
      <div class="card-header"><h2>Warenkorb</h2>
        <button class="btn btn-sm btn-secondary" onclick="clearCart()">Leeren</button>
      </div>
      ${cartLines}
      <div class="total-bar">
        <span class="label">Gesamt</span>
        <span class="amount">${fmt(cartTotal)}</span>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:10px;padding:12px" onclick="submitOrder()">
        ${orderMode === 'sofort' ? '💵 Jetzt buchen & bezahlen' : '📋 Auf Tab buchen'}
      </button>
    </div>
    ` : ''}
    ` : ''}
  `;
}

function setOrderGuest(id) { orderGuestId = id || null; orderCart = {}; render(); }
function setOrderMode(mode) { orderMode = mode; render(); }

function addToCart(articleId) {
  if (!orderGuestId) { showToast('Bitte zuerst Gast wählen'); return; }
  orderCart[articleId] = (orderCart[articleId] || 0) + 1;
  render();
}

function changeCart(articleId, delta) {
  orderCart[articleId] = Math.max(0, (orderCart[articleId] || 0) + delta);
  if (orderCart[articleId] === 0) delete orderCart[articleId];
  render();
}

function clearCart() { orderCart = {}; render(); }

function submitOrder() {
  const entries = Object.entries(orderCart).filter(([,q]) => q > 0);
  if (!entries.length) return;
  for (const [id, q] of entries) {
    const a = state.articles.find(x => x.id === id);
    if (a && a.stock < q) { showToast(`Zu wenig Bestand: ${a.name}`); return; }
  }
  const paid = orderMode === 'sofort';
  const newOrders = [];
  for (const [articleId, qty] of entries) {
    const a = state.articles.find(x => x.id === articleId);
    if (a) {
      a.stock -= qty;
      const p = findPerson(orderGuestId);
      const o = { id: uid(), guestId: orderGuestId, guestName: p ? p.name : '?', articleId, qty, ts: Date.now(), paid, payMode: paid ? 'cash' : null };
      state.orders.push(o);
      newOrders.push(o);
    }
  }
  orderCart = {};
  saveLocal();
  saveMeta();                       // Lagerbestand (Artikel) aktualisieren
  newOrders.forEach(o => putOrder(o)); // jede Bestellung einzeln speichern
  showToast(paid ? '💵 Bezahlt & gebucht!' : '📋 Auf Tab gebucht!');
  render();
}

// ══════════════════════════════════════════
//  ABRECHNUNG
// ══════════════════════════════════════════
let billFilter = 'offen';

function renderAbrechnung() {
  // Personen direkt aus den (gefilterten) Bestellungen ableiten —
  // so erscheinen auch bezahlte Buchungen von bereits gelöschten Gästen
  const seen = {};
  const guests = [];
  state.orders.forEach(o => {
    const matches = billFilter === 'offen' ? !o.paid
                  : billFilter === 'bezahlt' ? o.paid
                  : true;
    if (!matches || seen[o.guestId]) return;
    seen[o.guestId] = true;
    const p = findPerson(o.guestId);
    guests.push({ id: o.guestId, name: p ? p.name : (o.guestName || '?') });
  });

  const totalOpen = state.orders
    .filter(o => !o.paid)
    .reduce((s, o) => {
      const a = state.articles.find(x => x.id === o.articleId);
      return s + (a ? a.price * o.qty : 0);
    }, 0);

  const cards = guests.map(g => {
    const orders = filteredOrders(g.id);
    const total = orders.reduce((s, o) => {
      const a = state.articles.find(x => x.id === o.articleId);
      return s + (a ? a.price * o.qty : 0);
    }, 0);
    const isOpen = orders.some(o => !o.paid);

    // Group by article for summary, but keep individual lines with dates
    const lines = orders.map(o => {
      const a = state.articles.find(x => x.id === o.articleId);
      if (!a) return '';
      return `
        <div class="bill-detail-line">
          <span>${esc(a.name)} × ${o.qty}<span class="bdate">${fmtDate(o.ts)}</span></span>
          <span>${fmt(a.price * o.qty)}</span>
        </div>
      `;
    }).join('');

    return `
      <div class="bill-card">
        <div class="bill-header" onclick="toggleBill(this)">
          <span class="bname">${esc(g.name)}</span>
          <span class="btotal">${fmt(total)}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="bill-details">
          ${lines}
          ${isOpen ? `
            <div class="bill-actions">
              <button class="btn btn-green btn-sm" style="width:100%" onclick="payGuest('${g.id}','cash');render()">💵 Bar bezahlen</button>
            </div>
          ` : `<div style="color:var(--green);font-size:.78rem;margin-top:8px">✅ Bezahlt</div>`}
        </div>
      </div>
    `;
  }).join('');

  return `
    ${totalOpen > 0 ? `
    <div class="card" style="border-color:var(--accent)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:.85rem;color:var(--text2)">Gesamt offen</span>
        <span style="font-size:1.3rem;font-weight:800;color:var(--accent)">${fmt(totalOpen)}</span>
      </div>
      <div style="margin-top:10px">
        <button class="btn btn-secondary btn-sm" style="width:100%" onclick="einladenAuth(${totalOpen})">🎁 Als Einladung buchen &amp; löschen</button>
      </div>
    </div>
    ` : ''}
    <div class="pill-tabs">
      <button class="pill ${billFilter==='offen'?'active':''}" onclick="setBillFilter('offen')">Offen</button>
      <button class="pill ${billFilter==='bezahlt'?'active':''}" onclick="setBillFilter('bezahlt')">Bezahlt</button>
      <button class="pill ${billFilter==='alle'?'active':''}" onclick="setBillFilter('alle')">Alle</button>
    </div>
    ${guests.length ? cards : '<div class="empty"><div class="eicon">🎉</div><div>Nichts zu sehen hier</div></div>'}
    ${state.orders.some(o => o.paid) ? `
      <div style="text-align:center;margin-top:14px">
        <button class="btn btn-secondary btn-sm" onclick="clearPaid()">🗑️ Bezahlte Buchungen löschen</button>
      </div>
    ` : ''}
  `;
}

function filteredOrders(guestId) {
  return state.orders.filter(o => {
    if (o.guestId !== guestId) return false;
    if (billFilter === 'offen') return !o.paid;
    if (billFilter === 'bezahlt') return o.paid;
    return true;
  });
}

function setBillFilter(f) { billFilter = f; render(); }

function toggleBill(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function clearPaid() {
  if (!confirm('Alle bezahlten Buchungen löschen?')) return;
  const toDelete = state.orders.filter(o => o.paid);
  state.orders = state.orders.filter(o => !o.paid);
  saveLocal();
  toDelete.forEach(o => delOrder(o.id));
  render();
}

function firebaseResetAuth() {
  openModal(`
    <h3>🗑️ Firebase zurücksetzen</h3>
    <p style="color:var(--text2);font-size:.85rem">
      <strong style="color:#e74c3c">Achtung:</strong> Alle Artikel, Gäste, Bestellungen, Einkäufe und Einladungen werden unwiderruflich gelöscht.<br><br>
      Vereinsmitglieder bleiben erhalten.
    </p>
    <div class="form-row"><div class="field">
      <label>Passwort</label>
      <input id="m-pw" type="password" placeholder="••••" autofocus>
    </div></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn" style="background:#e74c3c;color:#fff" onclick="firebaseResetBestaetigt()">Alles löschen</button>
    </div>
  `);
}

function firebaseResetBestaetigt() {
  const pw = document.getElementById('m-pw').value;
  if (pw !== '0719') { showToast('Falsches Passwort'); return; }
  closeModal();
  // State leeren (Members behalten)
  state.articles    = [];
  state.guests      = [];
  state.orders      = [];
  state.purchases   = [];
  state.einladungen = [];
  // Firebase und localStorage löschen
  db.ref('data').remove().catch(() => {});
  localStorage.removeItem('darts-bar-state');
  showToast('✅ Firebase zurückgesetzt – bitte Artikel neu anlegen');
  render();
}

function einladenAuth(amount) {
  openModal(`
    <h3>🎁 Einladung buchen</h3>
    <p style="color:var(--text2);font-size:.85rem">Offener Betrag <strong style="color:var(--accent)">${fmt(amount)}</strong> wird als Einladung im Bericht vermerkt und alle offenen Bestellungen gelöscht.</p>
    <div class="form-row"><div class="field">
      <label>Passwort</label>
      <input id="m-pw" type="password" placeholder="••••" autofocus>
    </div></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="einladenBestaetigt(${amount})">Bestätigen</button>
    </div>
  `);
}

function einladenBestaetigt(amount) {
  const pw = document.getElementById('m-pw').value;
  if (pw !== '0719') { showToast('Falsches Passwort'); return; }
  closeModal();
  state.einladungen.push({ id: uid(), ts: Date.now(), amount });
  const toDelete = state.orders.filter(o => !o.paid); // offene werden gelöscht
  state.orders = state.orders.filter(o => o.paid);
  saveLocal();
  saveMeta();                          // Einladung (Meta) speichern
  toDelete.forEach(o => delOrder(o.id)); // offene Bestellungen einzeln löschen
  showToast(`🎁 ${fmt(amount)} als Einladung gebucht`);
  render();
}

// ══════════════════════════════════════════
//  BERICHT
// ══════════════════════════════════════════
let berichtMonth = monthKey(new Date());

function renderBericht() {
  // Collect all months from orders and purchases
  const months = new Set();
  state.orders.forEach(o => months.add(monthKey(new Date(o.ts))));
  state.purchases.forEach(p => months.add(monthKey(new Date(p.ts))));
  const sortedMonths = [...months].sort().reverse();
  if (!months.has(berichtMonth) && sortedMonths.length > 0) berichtMonth = sortedMonths[0];

  const monthOptions = sortedMonths.map(m =>
    `<option value="${m}" ${m === berichtMonth ? 'selected' : ''}>${fmtMonth(m)}</option>`
  ).join('');

  // Verkäufe (paid orders in selected month)
  const verkaufsOrders = state.orders.filter(o => o.paid && monthKey(new Date(o.ts)) === berichtMonth);
  const verkaufMap = {};
  let totalVerkauf = 0;
  verkaufsOrders.forEach(o => {
    const a = state.articles.find(x => x.id === o.articleId);
    if (!a) return;
    if (!verkaufMap[o.articleId]) verkaufMap[o.articleId] = { name: a.name, qty: 0, total: 0 };
    verkaufMap[o.articleId].qty += o.qty;
    verkaufMap[o.articleId].total += a.price * o.qty;
    totalVerkauf += a.price * o.qty;
  });

  // Einladungen in selected month
  const einladungsEntries = (state.einladungen || [])
    .filter(e => monthKey(new Date(e.ts)) === berichtMonth)
    .sort((a, b) => a.ts - b.ts);
  let totalEinladung = 0;
  einladungsEntries.forEach(e => { totalEinladung += e.amount; });

  // Einkäufe in selected month — individual entries
  const einkaufsEntries = state.purchases
    .filter(p => monthKey(new Date(p.ts)) === berichtMonth)
    .sort((a, b) => a.ts - b.ts);
  let totalEinkauf = 0;
  einkaufsEntries.forEach(p => { totalEinkauf += p.costPerUnit * p.qty; });

  const profit = totalVerkauf - totalEinkauf - totalEinladung;

  const verkaufRows = verkaufsOrders.slice().sort((a,b) => a.ts - b.ts).map(o => {
    const a = state.articles.find(x => x.id === o.articleId);
    const name = a ? a.name : 'Unbekannt';
    const price = a ? a.price : 0;
    const total = price * o.qty;
    const person = findPerson(o.guestId);
    const pname = person ? person.name : (o.guestName || '?');
    return `
      <div class="report-row">
        <div style="flex:1">
          <div class="rname">${esc(name)}</div>
          <div style="font-size:.68rem;color:var(--text2)">${fmtDate(o.ts)} · ${o.qty}× · ${esc(pname)}</div>
        </div>
        <span class="ramount income" style="margin-right:8px">${fmt(total)}</span>
        <button class="btn-icon" onclick="editOrderAuth('${o.id}')" title="Bearbeiten">✏️</button>
      </div>
    `;
  }).join('');

  const einkaufRows = einkaufsEntries.map(p => {
    const a = state.articles.find(x => x.id === p.articleId);
    const name = a ? a.name : 'Unbekannt';
    const total = p.costPerUnit * p.qty;
    return `
      <div class="report-row">
        <div style="flex:1">
          <div class="rname">${esc(name)}</div>
          <div style="font-size:.68rem;color:var(--text2)">${fmtDate(p.ts)} · ${p.qty}× à ${fmt(p.costPerUnit)}</div>
        </div>
        <span class="ramount expense" style="margin-right:8px">${total > 0 ? fmt(total) : '—'}</span>
        <button class="btn-icon" onclick="editPurchaseAuth('${p.id}')" title="Bearbeiten">✏️</button>
      </div>
    `;
  }).join('');

  return `
    <span class="print-title">DC Hotshots – Monatsbericht · ${fmtMonth(berichtMonth)}</span>
    <div class="card month-select">
      <div class="card-header" style="margin-bottom:0">
        <h2>📊 Monatsbericht</h2>
      </div>
      ${sortedMonths.length ? `
        <select onchange="setBerichtMonth(this.value)" style="margin-top:10px">
          ${monthOptions}
        </select>
      ` : '<div style="color:var(--text2);font-size:.8rem;margin-top:8px">Noch keine Daten vorhanden</div>'}
    </div>
    ${sortedMonths.length ? `<button class="pdf-btn" onclick="printPage()">🖨️ Als PDF speichern / Drucken</button>` : ''}

    ${sortedMonths.length ? `
    <div class="summary-bar">
      <div class="summary-chip">
        <div class="sc-label">Verkäufe</div>
        <div class="sc-val income">${fmt(totalVerkauf)}</div>
      </div>
      <div class="summary-chip">
        <div class="sc-label">Einkäufe</div>
        <div class="sc-val expense">${fmt(totalEinkauf)}</div>
      </div>
      ${totalEinladung > 0 ? `
      <div class="summary-chip">
        <div class="sc-label">Einladungen</div>
        <div class="sc-val expense">${fmt(totalEinladung)}</div>
      </div>` : ''}
      <div class="summary-chip">
        <div class="sc-label">Gewinn</div>
        <div class="sc-val profit">${fmt(profit)}</div>
      </div>
    </div>

    <div class="card">
      <div class="report-section">
        <h3>💰 Verkäufe</h3>
        ${verkaufRows || '<div style="color:var(--text2);font-size:.8rem">Keine bezahlten Bestellungen</div>'}
      </div>
      ${verkaufsOrders.length ? `
        <div style="display:flex;justify-content:flex-end;padding-top:8px;border-top:1px solid var(--border)">
          <span style="font-weight:800;color:var(--green)">${fmt(totalVerkauf)}</span>
        </div>
      ` : ''}
    </div>

    <div class="card">
      <div class="report-section">
        <h3>🛒 Einkäufe</h3>
        ${einkaufRows || '<div style="color:var(--text2);font-size:.8rem">Keine Einkäufe gebucht</div>'}
      </div>
      ${einkaufsEntries.length ? `
        <div style="display:flex;justify-content:flex-end;padding-top:8px;border-top:1px solid var(--border)">
          <span style="font-weight:800;color:var(--accent)">${fmt(totalEinkauf)}</span>
        </div>
      ` : ''}
    </div>

    ${einladungsEntries.length ? `
    <div class="card">
      <div class="report-section">
        <h3>🎁 Einladungen</h3>
        ${einladungsEntries.map(e => `
          <div class="report-row">
            <div style="flex:1">
              <div class="rname">Einladung</div>
              <div style="font-size:.68rem;color:var(--text2)">${fmtDate(e.ts)}</div>
            </div>
            <span class="ramount expense">${fmt(e.amount)}</span>
          </div>
        `).join('')}
      </div>
      <div style="display:flex;justify-content:flex-end;padding-top:8px;border-top:1px solid var(--border)">
        <span style="font-weight:800;color:var(--accent)">${fmt(totalEinladung)}</span>
      </div>
    </div>
    ` : ''}

    ` : ''}
  `;
}

function setBerichtMonth(m) { berichtMonth = m; render(); }

  // Aktuellen Seiteninhalt klonen und interaktive Elemente entfernen

  clone.querySelectorAll('button, select, input, textarea, .pdf-btn, .sort-btns').forEach(el => el.remove());
  const titleEl = clone.querySelector('.print-title');
  const heading = titleEl ? titleEl.textContent : 'DC Hotshots Vereinsbar';

  const css = `
    * { box-sizing: border-box; }
    body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; color: #000;
           margin: 16px; font-size: 12px; }
    .print-title { font-size: 16px; font-weight: 800; margin: 0 0 14px; }
    .card { border: 1px solid #ccc; border-radius: 6px; padding: 10px 12px;
            margin-bottom: 12px; break-inside: avoid; page-break-inside: avoid; }
    .card-header { display: flex; align-items: center; margin-bottom: 8px; }
    h2 { font-size: 14px; margin: 0 0 8px; }
    h3 { font-size: 13px; margin: 8px 0 6px; }
    .summary-bar { display: flex; gap: 10px; margin-bottom: 12px; }
    .summary-chip { flex: 1; border: 1px solid #ccc; border-radius: 6px; padding: 8px; text-align: center; }
    .sc-label { font-size: 10px; text-transform: uppercase; color: #555; }
    .sc-val { font-size: 15px; font-weight: 800; margin-top: 2px; }
    .sc-val.income  { color: #1a7a3c; }
    .sc-val.expense { color: #c0392b; }
    .sc-val.profit  { color: #1a5fa8; }
    .report-row { display: flex; align-items: center; justify-content: space-between;
                  padding: 5px 0; border-bottom: 1px solid #eee; gap: 8px; }
    .report-row:last-child { border-bottom: none; }
    .rname { font-weight: 600; }
    .ramount { font-weight: 700; white-space: nowrap; }
    .ramount.income  { color: #1a7a3c; }
    .ramount.expense { color: #c0392b; }
    .list-item { display: flex; align-items: center; justify-content: space-between;
                 gap: 8px; padding: 5px 0; border-bottom: 1px solid #eee; }
    .list-item .name { font-weight: 600; }
    .list-item .sub { font-size: 10px; color: #555; }
    .qty-badge { border: 1px solid #ccc; border-radius: 10px; padding: 2px 8px; font-weight: 700; }
    .qty-badge.low { background: #fdd; color: #900; }
  `;
  const doc = `<!doctype html><html><head><meta charset="utf-8">
    <title>${heading}</title><style>${css}</style></head>
    <body>${clone.innerHTML}</body></html>`;

  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
  document.body.appendChild(iframe);
  const idoc = iframe.contentWindow.document;
  idoc.open(); idoc.write(doc); idoc.close();
  iframe.onload = () => {
    setTimeout(() => {
      try { iframe.contentWindow.focus(); iframe.contentWindow.print(); }
      catch (e) { window.print(); }
      setTimeout(() => { try { document.body.removeChild(iframe); } catch (e) {} }, 2000);
    }, 250);
  };
}

function editPurchaseAuth(purchaseId) {
  openModal(`
    <h3>🔒 Passwort erforderlich</h3>
    <div class="form-row"><div class="field">
      <label>Passwort</label>
      <input id="m-pw" type="password" placeholder="••••" autofocus>
    </div></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="checkPurchaseAuth('${purchaseId}')">Weiter</button>
    </div>
  `);
}

function checkPurchaseAuth(purchaseId) {
  const pw = document.getElementById('m-pw').value;
  if (pw !== '0719') { showToast('Falsches Passwort'); return; }
  closeModal();
  editPurchase(purchaseId);
}

function editPurchase(purchaseId) {
  const p = state.purchases.find(x => x.id === purchaseId);
  if (!p) return;
  const a = state.articles.find(x => x.id === p.articleId);
  const name = a ? a.name : 'Unbekannt';
  const dateStr = new Date(p.ts).toISOString().slice(0, 16);
  openModal(`
    <h3>✏️ Einkauf bearbeiten</h3>
    <div style="color:var(--text2);font-size:.8rem;margin-bottom:12px">${esc(name)}</div>
    <div class="form-row">
      <div class="field"><label>Menge</label>
        <input id="m-eq" type="number" min="1" value="${p.qty}">
      </div>
      <div class="field"><label>Preis / Stück (€)</label>
        <input id="m-ec" type="number" step="0.01" min="0" value="${p.costPerUnit}">
      </div>
    </div>
    <div class="form-row"><div class="field"><label>Datum & Uhrzeit</label>
      <input id="m-et" type="datetime-local" value="${dateStr}">
    </div></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="deletePurchase('${p.id}')">🗑️ Löschen</button>
      <button class="btn btn-primary" onclick="savePurchaseEdit('${p.id}')">Speichern</button>
    </div>
  `);
}

function savePurchaseEdit(purchaseId) {
  const p = state.purchases.find(x => x.id === purchaseId);
  if (!p) return;
  const qty = parseInt(document.getElementById('m-eq').value) || 0;
  const cost = parseFloat(document.getElementById('m-ec').value) || 0;
  const tsVal = document.getElementById('m-et').value;
  if (qty <= 0) { showToast('Menge muss > 0 sein'); return; }
  const diff = qty - p.qty;
  const a = state.articles.find(x => x.id === p.articleId);
  if (a) a.stock += diff;
  p.qty = qty;
  p.costPerUnit = cost;
  if (tsVal) p.ts = new Date(tsVal).getTime();
  saveState(); putPurchase(p); closeModal();
  showToast('Einkauf aktualisiert ✅');
  render();
}

function deletePurchase(purchaseId) {
  if (!confirm('Einkauf wirklich löschen?')) return;
  const p = state.purchases.find(x => x.id === purchaseId);
  if (p) {
    const a = state.articles.find(x => x.id === p.articleId);
    if (a) a.stock -= p.qty;
  }
  state.purchases = state.purchases.filter(x => x.id !== purchaseId);
  saveState(); delPurchase(purchaseId); closeModal();
  showToast('Einkauf gelöscht');
  render();
}

function monthKey(date) {
  return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
}

function fmtMonth(key) {
  const [y, m] = key.split('-');
  const names = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  return names[parseInt(m) - 1] + ' ' + y;
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function guestTotal(guestId, includePaid = false) {
  return state.orders
    .filter(o => o.guestId === guestId && (includePaid || !o.paid))
    .reduce((s, o) => {
      const a = state.articles.find(x => x.id === o.articleId);
      return s + (a ? a.price * o.qty : 0);
    }, 0);
}

function fmt(n) {
  return '€ ' + n.toFixed(2).replace('.', ',');
}

function fmtDate(ts) {
  const d = new Date(ts);
  const day = String(d.getDate()).padStart(2,'0');
  const mon = String(d.getMonth()+1).padStart(2,'0');
  const h = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return `${day}.${mon}. ${h}:${min}`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, duration = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => {
    const inp = document.querySelector('#modal-content input');
    if (inp) inp.focus();
  }, 100);
}

window.closeModal = (e) => {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
};

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
let appStarted = false;
function startApp() {
  if (appStarted) return;
  appStarted = true;
  loadState();
  showPage('gaeste');

  // Zeige Login wenn noch nicht authentifiziert
  if (sessionStorage.getItem('darts-auth') !== '1') {
    document.getElementById('login-screen').style.display = 'flex';
  } else {
    document.getElementById('login-screen').style.display = 'none';
  }
}

// Anonyme Firebase-Anmeldung (damit die DB-Regeln auf "nur angemeldet" gestellt
// werden können und die Datenbank nicht mehr öffentlich offen ist).
auth.onAuthStateChanged(user => { if (user) startApp(); });
auth.signInAnonymously().catch(err => {
  // Falls Anonyme Anmeldung (noch) nicht aktiviert ist: App trotzdem starten,
  // damit sie unter offenen Regeln weiter funktioniert.
  console.warn('Anonyme Anmeldung fehlgeschlagen:', err && err.code);
  startApp();
});
// Sicherheitsnetz: falls Auth hängt, nach 4s trotzdem starten
setTimeout(startApp, 4000);

// Alle alten Service Worker deregistrieren
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
}
</script>
